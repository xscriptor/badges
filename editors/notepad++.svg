<svg xmlns="http://www.w3.org/2000/svg" width="131.5" height="28" role="img" aria-label="Notepad++">
  <title>Notepad++</title>
  <g shape-rendering="crispEdges">
    <rect width="35" height="28" fill="#fd9353"/>
    <rect x="35" width="96.5" height="28" fill="#161b22"/>
  </g>
  <g fill="#ffffff" text-anchor="middle" font-family="Verdana,Geneva,DejaVu Sans,sans-serif" text-rendering="geometricPrecision" font-size="14">
    <!-- Icon area -->
    
             <g transform="translate(11.5, 6.0)">
                <rect x="1" y="1" width="10" height="14" fill="#ffffff"/>
                <path d="M3,4 L9,4 M3,8 L9,8 M3,12 L7,12" stroke="#fd9353" stroke-width="1"/>
                <text x="8" y="11" font-size="8" fill="#fd9353" font-weight="bold">+</text>
             </g>
             
    
    <!-- Divider X -->
    <text x="35" y="19.0" text-anchor="middle" font-weight="bold" font-family="Verdana,Geneva,DejaVu Sans,sans-serif" font-size="14" fill="#ffffff">X</text>
    
    <!-- Label -->
    <text x="83.25" y="19.0" font-weight="bold" fill="#ffffff">Notepad++</text>
  </g>
</svg>