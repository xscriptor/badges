                 <rect x="2" y="6" width="8" height="2" fill="#ffffff" transform="rotate(10 6 7)"/>
                 <rect x="4" y="2" width="8" height="2" fill="#ffffff" transform="rotate(25 8 3)"/>
              </g>
              
    
    <!-- Divider X -->
