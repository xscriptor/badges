<svg xmlns="http://www.w3.org/2000/svg" width="123.0" height="28" role="img" aria-label="Whatsapp">
  <title>Whatsapp</title>
  <g shape-rendering="crispEdges">
    <rect width="35" height="28" fill="#5ad4e6"/>
    <rect x="35" width="88.0" height="28" fill="#161b22"/>
  </g>
  <g fill="#ffffff" text-anchor="middle" font-family="Verdana,Geneva,DejaVu Sans,sans-serif" text-rendering="geometricPrecision" font-size="14">
    <!-- Icon area -->
    <text x="17.5" y="19.0" font-weight="bold" font-family="sans-serif" fill="#ffffff">@</text>
    
    <!-- Divider X -->
    <text x="35" y="19.0" text-anchor="middle" font-weight="bold" font-family="Verdana,Geneva,DejaVu Sans,sans-serif" font-size="14" fill="#ffffff">X</text>
    
    <!-- Label -->
    <text x="79.0" y="19.0" font-weight="bold" fill="#ffffff">Whatsapp</text>
  </g>
</svg>