<svg xmlns="http://www.w3.org/2000/svg" width="106.0" height="28" role="img" aria-label="eslint">
  <title>eslint</title>
  <g shape-rendering="crispEdges">
    <rect width="35" height="28" fill="#fce566"/>
    <rect x="35" width="71.0" height="28" fill="#161b22"/>
  </g>
  <g fill="#ffffff" text-anchor="middle" font-family="Verdana,Geneva,DejaVu Sans,sans-serif" text-rendering="geometricPrecision" font-size="14">
    <!-- Icon area -->
    
         <g transform="translate(10.5, 7.0)">
             <path d="M14,0 L10,4 L11,7 L7,11 L4,10 L0,14" stroke="#ffffff" stroke-width="2"/>
         </g>
         
    
    <!-- Divider X -->
    <text x="35" y="19.0" text-anchor="middle" font-weight="bold" font-family="Verdana,Geneva,DejaVu Sans,sans-serif" font-size="14" fill="#ffffff">X</text>
    
    <!-- Label -->
    <text x="70.5" y="19.0" font-weight="bold" fill="#ffffff">eslint</text>
  </g>
</svg>