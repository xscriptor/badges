<svg xmlns="http://www.w3.org/2000/svg" width="157.0" height="28" role="img" aria-label="react-native">
  <title>react-native</title>
  <g shape-rendering="crispEdges">
    <rect width="35" height="28" fill="#fc618d"/>
    <rect x="35" width="122.0" height="28" fill="#161b22"/>
  </g>
  <g fill="#ffffff" text-anchor="middle" font-family="Verdana,Geneva,DejaVu Sans,sans-serif" text-rendering="geometricPrecision" font-size="14">
    <!-- Icon area -->
    
            <g transform="translate(17.5, 14.0) scale(0.9)">
                <circle r="2" fill="#ffffff"/>
