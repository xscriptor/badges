<svg xmlns="http://www.w3.org/2000/svg" width="114.5" height="28" role="img" aria-label="mozilla">
  <title>mozilla</title>
  <g shape-rendering="crispEdges">
    <rect width="35" height="28" fill="#999999"/>
    <rect x="35" width="79.5" height="28" fill="#000000"/>
  </g>
  <g fill="#ffffff" text-anchor="middle" font-family="Verdana,Geneva,DejaVu Sans,sans-serif" text-rendering="geometricPrecision" font-size="14">
    <!-- Icon area -->
    
         <g transform="translate(10.5, 7.0)">
             <circle cx="7" cy="7" r="6" stroke="#ffffff" stroke-width="1.5" fill="none"/>
             <text x="7" y="10" text-anchor="middle" font-weight="bold" font-family="sans-serif" font-size="8" fill="#ffffff">C</text>
         </g>
         
    
    <!-- Divider X -->
