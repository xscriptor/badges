<svg xmlns="http://www.w3.org/2000/svg" width="174.0" height="28" role="img" aria-label="stack-overflow">
  <title>stack-overflow</title>
  <g shape-rendering="crispEdges">
    <rect width="35" height="28" fill="#948ae3"/>
    <rect x="35" width="139.0" height="28" fill="#161b22"/>
  </g>
  <g fill="#ffffff" text-anchor="middle" font-family="Verdana,Geneva,DejaVu Sans,sans-serif" text-rendering="geometricPrecision" font-size="14">
    <!-- Icon area -->
    
              <g transform="translate(11.5, 7.0)">
                 <path d="M0,10 L12,10 L12,14 L0,14 Z M0,10 L0,14" fill="#ffffff"/>
