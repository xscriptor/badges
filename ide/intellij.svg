<svg xmlns="http://www.w3.org/2000/svg" width="123.0" height="28" role="img" aria-label="intellij">
  <title>intellij</title>
  <g shape-rendering="crispEdges">
    <rect width="35" height="28" fill="#fc618d"/>
    <rect x="35" width="88.0" height="28" fill="#363537"/>
  </g>
  <g fill="#f7f1ff" text-anchor="middle" font-family="Verdana,Geneva,DejaVu Sans,sans-serif" text-rendering="geometricPrecision" font-size="14">
    <!-- Icon area -->
    
             <g transform="translate(9.5, 6.0)">
                <rect x="0" y="0" width="16" height="16" rx="2" fill="#f7f1ff"/>
                <text x="8" y="13" text-anchor="middle" font-weight="bold" font-family="sans-serif" font-size="10" fill="#fc618d">IJ</text>
             </g>
             
    
    <!-- Divider X -->
    <text x="35" y="19.0" text-anchor="middle" font-weight="bold" font-family="Verdana,Geneva,DejaVu Sans,sans-serif" font-size="14" fill="#f7f1ff">X</text>
    
    <!-- Label -->
    <text x="79.0" y="19.0" font-weight="bold" fill="#f7f1ff">intellij</text>
  </g>
</svg>