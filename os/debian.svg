<svg xmlns="http://www.w3.org/2000/svg" width="106.0" height="28" role="img" aria-label="debian">
  <title>debian</title>
  <g shape-rendering="crispEdges">
    <rect width="35" height="28" fill="#fd9353"/>
    <rect x="35" width="71.0" height="28" fill="#161b22"/>
  </g>
  <g fill="#ffffff" text-anchor="middle" font-family="Verdana,Geneva,DejaVu Sans,sans-serif" text-rendering="geometricPrecision" font-size="14">
    <!-- Icon area -->
    
         <g transform="translate(9.5, 7.0)">
             <rect x="0" y="0" width="16" height="11" rx="1" fill="#ffffff"/>
             <rect x="5" y="12" width="6" height="2" fill="#ffffff"/>
         </g>
         
    
    <!-- Divider X -->
    <text x="35" y="19.0" text-anchor="middle" font-weight="bold" font-family="Verdana,Geneva,DejaVu Sans,sans-serif" font-size="14" fill="#ffffff">X</text>
    
    <!-- Label -->
    <text x="70.5" y="19.0" font-weight="bold" fill="#ffffff">debian</text>
  </g>
</svg>