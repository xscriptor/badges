<svg xmlns="http://www.w3.org/2000/svg" width="97.5" height="28" role="img" aria-label="Julia">
  <title>Julia</title>
  <g shape-rendering="crispEdges">
    <rect width="35" height="28" fill="#fc618d"/>
    <rect x="35" width="62.5" height="28" fill="#161b22"/>
  </g>
  <g fill="#ffffff" text-anchor="middle" font-family="Verdana,Geneva,DejaVu Sans,sans-serif" text-rendering="geometricPrecision" font-size="14">
